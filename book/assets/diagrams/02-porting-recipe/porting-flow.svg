<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 330" role="img" aria-labelledby="title desc">
  <title id="title">GGUF to ANE porting flow</title>
  <desc id="desc">The conversion flow starts with GGUF metadata and weights, builds a Conv2d graph, converts to CoreML, quantizes, compiles, checks residency, checks quality, then runs through Swift.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #142033; }
      .step { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 10; }
      .gate { fill: #e8fff5; stroke: #0f9f6e; stroke-width: 2; rx: 10; }
      .arrow { stroke: #475569; stroke-width: 2.3; marker-end: url(#arrow); fill: none; }
      .label { font-size: 16px; font-weight: 700; }
      .small { font-size: 13px; fill: #475569; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <rect width="1100" height="330" fill="#f8fafc" />
  <text x="550" y="34" text-anchor="middle" class="label">Porting recipe: weights to validated ANE runtime</text>
  <g transform="translate(34 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">GGUF</text>
    <text x="56" y="55" text-anchor="middle" class="small">Q8_0 blocks</text>
  </g>
  <g transform="translate(164 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">metadata</text>
    <text x="56" y="55" text-anchor="middle" class="small">dims, layers</text>
  </g>
  <g transform="translate(294 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">Conv2d</text>
    <text x="56" y="55" text-anchor="middle" class="small">[1,C,T,1]</text>
  </g>
  <g transform="translate(424 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">CoreML</text>
    <text x="56" y="55" text-anchor="middle" class="small">mlprogram</text>
  </g>
  <g transform="translate(554 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">INT8</text>
    <text x="56" y="55" text-anchor="middle" class="small">per tensor</text>
  </g>
  <g transform="translate(684 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">compile</text>
    <text x="56" y="55" text-anchor="middle" class="small">.mlmodelc</text>
  </g>
  <g transform="translate(814 70)">
    <rect width="112" height="118" class="gate" />
    <text x="56" y="31" text-anchor="middle" class="label">gates</text>
    <text x="56" y="58" text-anchor="middle" class="small">100% ANE</text>
    <text x="56" y="82" text-anchor="middle" class="small">cos >= 0.97</text>
  </g>
  <g transform="translate(944 90)">
    <rect width="112" height="78" class="step" />
    <text x="56" y="31" text-anchor="middle" class="label">Swift</text>
    <text x="56" y="55" text-anchor="middle" class="small">runtime</text>
  </g>
  <path d="M146 129 H162" class="arrow" /><path d="M276 129 H292" class="arrow" />
  <path d="M406 129 H422" class="arrow" /><path d="M536 129 H552" class="arrow" />
  <path d="M666 129 H682" class="arrow" /><path d="M796 129 H812" class="arrow" />
  <path d="M926 129 H942" class="arrow" />
  <text x="550" y="245" text-anchor="middle" class="small">Benchmark only after both gates pass.</text>
</svg>