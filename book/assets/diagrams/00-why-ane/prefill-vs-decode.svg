<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Prefill versus decode</title>
  <desc id="desc">Prefill processes many prompt tokens together while decode processes one generated token at a time using the KV cache.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#263746"/></marker>
    <style>.bg{fill:#fbfcfd}.lane{fill:#fff;stroke:#d7dee6;stroke-width:2;rx:10}.title{font:700 20px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#1d2b36}.text{font:15px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#40515f}.token{fill:#eef4ff;stroke:#3867b7;stroke-width:1.5;rx:5}.decode{fill:#e8f7f1;stroke:#16845b;stroke-width:1.5;rx:5}.cache{fill:#fff7e6;stroke:#b87900;stroke-width:1.5;rx:8}.arrow{stroke:#263746;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="900" height="360"/>
  <rect class="lane" x="42" y="56" width="816" height="116"/>
  <text class="title" x="70" y="92">Prefill: process the prompt as a block</text>
  <text class="text" x="70" y="122">Many tokens enter one forward pass. More arithmetic per call, better hardware utilization.</text>
  <g transform="translate(620 92)">
    <rect class="token" x="0" y="0" width="34" height="42"/><rect class="token" x="42" y="0" width="34" height="42"/><rect class="token" x="84" y="0" width="34" height="42"/><rect class="token" x="126" y="0" width="34" height="42"/>
    <text class="text" x="17" y="68" text-anchor="middle">T</text><text class="text" x="59" y="68" text-anchor="middle">T</text><text class="text" x="101" y="68" text-anchor="middle">T</text><text class="text" x="143" y="68" text-anchor="middle">T</text>
  </g>
  <rect class="lane" x="42" y="202" width="816" height="116"/>
  <text class="title" x="70" y="238">Decode: generate one token, then repeat</text>
  <text class="text" x="70" y="268">One new token enters each step. The model reloads weights, but reuses past K/V rows.</text>
  <rect class="decode" x="634" y="232" width="38" height="46"/><text class="text" x="653" y="304" text-anchor="middle">T=1</text>
  <rect class="cache" x="706" y="226" width="96" height="56"/><text class="text" x="754" y="249" text-anchor="middle">KV</text><text class="text" x="754" y="269" text-anchor="middle">cache</text>
  <path class="arrow" d="M674 255 H700"/>
</svg>
