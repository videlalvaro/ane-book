<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="title desc">
  <title id="title">Autoregressive LLM decode loop</title>
  <desc id="desc">A prompt is tokenized, embedded, passed through transformer layers to logits, sampled into a next token, and fed back into the sequence.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#234"/>
    </marker>
    <style>
      .bg{fill:#fbfcfd}.box{fill:#fff;stroke:#2f4050;stroke-width:2;rx:8}.ane{fill:#e8f7f1;stroke:#16845b}.host{fill:#eef4ff;stroke:#3867b7}.text{font:600 18px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#1d2b36}.small{font:14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#455866}.arrow{stroke:#234;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.token{fill:#fff7e6;stroke:#b87900;stroke-width:1.5;rx:5}
    </style>
  </defs>
  <rect class="bg" width="900" height="360"/>
  <text class="text" x="32" y="42">Modern inference is an autoregressive loop</text>
  <rect class="host box" x="42" y="92" width="130" height="78"/>
  <text class="text" x="72" y="126">Tokens</text>
  <text class="small" x="60" y="150">IDs from text</text>
  <rect class="host box" x="218" y="92" width="135" height="78"/>
  <text class="text" x="250" y="126">Embed</text>
  <text class="small" x="238" y="150">IDs to vectors</text>
  <rect class="ane box" x="400" y="78" width="170" height="106"/>
  <text class="text" x="425" y="115">Transformer</text>
  <text class="small" x="430" y="142">layers update</text>
  <text class="small" x="430" y="160">hidden state</text>
  <rect class="ane box" x="616" y="92" width="112" height="78"/>
  <text class="text" x="646" y="126">Logits</text>
  <text class="small" x="636" y="150">vocab scores</text>
  <rect class="host box" x="774" y="92" width="92" height="78"/>
  <text class="text" x="790" y="126">Sample</text>
  <text class="small" x="793" y="150">next ID</text>
  <path class="arrow" d="M172 131 H212"/>
  <path class="arrow" d="M353 131 H394"/>
  <path class="arrow" d="M570 131 H610"/>
  <path class="arrow" d="M728 131 H768"/>
  <path class="arrow" d="M820 170 C820 260 115 260 110 174"/>
  <text class="small" x="310" y="286">The sampled token is appended to the sequence, then the loop runs again.</text>
  <rect class="token" x="58" y="222" width="46" height="34"/><text class="small" x="72" y="244">The</text>
  <rect class="token" x="112" y="222" width="46" height="34"/><text class="small" x="124" y="244">cat</text>
  <rect class="token" x="166" y="222" width="46" height="34"/><text class="small" x="181" y="244">sat</text>
  <rect class="token" x="220" y="222" width="46" height="34"/><text class="small" x="237" y="244">on</text>
  <rect class="token" x="274" y="222" width="46" height="34"/><text class="small" x="286" y="244">...</text>
</svg>
